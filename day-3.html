<!DOCTYPE html>
<html>
<head>
    <title>Positive Negative Zero</title>
</head>
<body>

<script>
    let number = 10;

    if (number > 0) {
        console.log("Positive");
    }
    else if (number < 0) {
        console.log("Negative");
    }
    else {
        console.log("Zero");
    }




    let number = 7;

    if (number % 2 === 0) {
        console.log("Even");
    }
    else {
        console.log("Odd");
    }





    let age = 45;

    if (age < 18) {
        console.log("Minor");
    }
    else if (age >= 18 && age <= 59) {
        console.log("Adult");
    }
    else {
        console.log("Senior Citizen");
    }



    let num1 = 25;
    let num2 = 40;

    if (num1 > num2) {
        console.log(num1 + " is the largest");
    }
    else if (num2 > num1) {
        console.log(num2 + " is the largest");
    }
    else {
        console.log("Both numbers are equal");
    }




    let marks = 82;

    if (marks >= 90) {
        console.log("Grade A");
    }
    else if (marks >= 80) {
        console.log("Grade B");
    }
    else if (marks >= 70) {
        console.log("Grade C");
    }
    else if (marks >= 60) {
        console.log("Grade D");
    }
    else {
        console.log("Fail");
    }





    let a = 10;
    let b = 25;
    let c = 18;

    if (a >= b && a >= c) {
        console.log(a + " is the largest");
    }
    else if (b >= a && b >= c) {
        console.log(b + " is the largest");
    }
    else {
        console.log(c + " is the largest");
    }

</script>

</body>
</html>
